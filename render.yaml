services:
  - type: web
    name: fairway-api
    runtime: docker
    plan: free
    region: oregon
    repo: https://github.com/rokohli/golf_rank
    dockerContext: ./services/api
    dockerfilePath: ./services/api/Dockerfile
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: staging
      - key: ALLOW_DEVELOPMENT_IDENTITY
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_MAX_OVERFLOW
        value: "5"
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: REDIS_URL
        fromService:
          name: fairway-rate-limits
          type: keyvalue
          property: connectionString
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_KEY_SALT
        generateValue: true
      - key: TRUSTED_CLIENT_IP_HEADER
        value: cf-connecting-ip
      - key: ALLOWED_HOSTS
        value: fairway-api-h93s.onrender.com
      - key: MAX_REQUEST_BODY_BYTES
        value: "1048576"
      - key: OPERATIONS_ALERT_WEBHOOK_URL
        sync: false
      - key: OPERATIONS_ALERT_WEBHOOK_TIMEOUT_SECONDS
        value: "2"
      - key: RATE_LIMIT_ALERT_WINDOW_SECONDS
        value: "300"
      - key: RATE_LIMIT_BACKEND_FAILURE_ALERT_THRESHOLD
        value: "3"
      - key: RATE_LIMIT_DENIAL_ALERT_THRESHOLD
        value: "50"
      - key: RATE_LIMIT_IDENTITY_ALERT_THRESHOLD
        value: "10"
      - key: RATE_LIMIT_ALERT_COOLDOWN_SECONDS
        value: "900"
      - key: RATE_LIMIT_ALERT_MAX_TRACKED_KEYS
        value: "10000"

  - type: keyvalue
    name: fairway-rate-limits
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off
