services:
  - type: web
    name: fairway-api
    runtime: docker
    plan: free
    region: oregon
    repo: https://github.com/rokohli/golf_rank
    dockerContext: ./services/api
    dockerfilePath: ./services/api/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: staging
      - key: ALLOW_DEVELOPMENT_IDENTITY
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: DATABASE_MAX_OVERFLOW
        value: "5"
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: fairway-rate-limits
          type: keyvalue
          property: connectionString
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_KEY_SALT
        generateValue: true
      - key: TRUST_RENDER_FORWARDED_FOR
        value: "true"
      - key: ALLOWED_HOSTS
        value: fairway-api-h93s.onrender.com
      - key: MAX_REQUEST_BODY_BYTES
        value: "1048576"

  - type: keyvalue
    name: fairway-rate-limits
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off
