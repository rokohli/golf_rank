services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: golf_rank
      POSTGRES_USER: golf_rank
      POSTGRES_PASSWORD: golf_rank
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golf_rank -d golf_rank"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./services/api
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
